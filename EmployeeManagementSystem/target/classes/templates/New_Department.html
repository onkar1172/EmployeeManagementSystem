<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Department</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2,#6dd5ed);
            background-size:300% 300%;
            animation:gradientBG 10s ease infinite;
        }

        @keyframes gradientBG{
            0%{
                background-position:0% 50%;
            }
            50%{
                background-position:100% 50%;
            }
            100%{
                background-position:0% 50%;
            }
        }

        .container{
            width:450px;
            background:rgba(255,255,255,0.95);
            padding:35px;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,0.25);
        }

        h2{
            text-align:center;
            color:#2c3e50;
            margin-bottom:30px;
            font-size:30px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-size:16px;
            font-weight:bold;
            color:#333;
        }

        input[type="text"]{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:16px;
            transition:0.3s;
        }

        input[type="text"]:focus{
            outline:none;
            border-color:#667eea;
            box-shadow:0 0 8px rgba(102,126,234,0.4);
        }

        .submit-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:linear-gradient(45deg,#667eea,#764ba2);
            color:white;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .submit-btn:hover{
            transform:scale(1.03);
            background:linear-gradient(45deg,#5a67d8,#6b46c1);
        }

    </style>

</head>

<body>

<div class="container">

    <form action="/savedepartment" th:object="${department}" method="post">

        <h2>🏢 Update Department</h2>

        <div class="form-group">
            <label>Department Name</label>
            <input type="text" th:field="*{name}" placeholder="Enter Department Name">
        </div>

        <div class="form-group">
            <label>Head of Department (HOD)</label>
            <input type="text" th:field="*{hod}" placeholder="Enter HOD Name">
        </div>

        <input type="submit" value="Update Department" class="submit-btn">

    </form>

</div>

</body>
</html>
