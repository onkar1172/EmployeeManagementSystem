<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe,#43e97b);
            background-size:300% 300%;
            animation:bgAnimation 10s ease infinite;
        }

        @keyframes bgAnimation{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .container{
            width:90%;
            max-width:900px;
            text-align:center;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(15px);
            padding:50px;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,0.3);
        }

        h1{
            color:#fff;
            font-size:40px;
            margin-bottom:15px;
        }

        .subtitle{
            color:#f8f9fa;
            font-size:18px;
            margin-bottom:40px;
        }

        .card-container{
            display:flex;
            justify-content:center;
            gap:30px;
            flex-wrap:wrap;
        }

        .card{
            background:white;
            width:280px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
            transition:0.4s;
        }

        .card:hover{
            transform:translateY(-10px) scale(1.05);
            box-shadow:0 20px 35px rgba(0,0,0,0.3);
        }

        .card h2{
            color:#333;
            margin-bottom:20px;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            background:linear-gradient(45deg,#007BFF,#00C6FF);
            color:white;
            padding:12px 28px;
            border-radius:30px;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            background:linear-gradient(45deg,#00C6FF,#007BFF);
            transform:scale(1.08);
        }

        .footer{
            margin-top:35px;
            color:white;
            font-size:15px;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>🏢 Employee Management System</h1>

    <p class="subtitle">
        Welcome to the Employee Management Service
    </p>

    <div class="card-container">

        <div class="card">
            <h2>🏬 Departments</h2>
            <a href="/alldepartments" class="btn">
                View Departments
            </a>
        </div>

        <div class="card">
            <h2>👨‍💼 Employees</h2>
            <a href="/allemployees" class="btn">
                View Employees
            </a>
        </div>

    </div>

    <div class="footer">
        © 2026 Employee Management System
    </div>

</div>

</body>
</html>
