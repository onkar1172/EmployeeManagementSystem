<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Employee</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe,#43e97b);
            background-size:300% 300%;
            animation:gradient 10s ease infinite;
        }

        @keyframes gradient{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .container{
            width:450px;
            background:rgba(255,255,255,0.95);
            padding:35px;
            border-radius:18px;
            box-shadow:0 12px 30px rgba(0,0,0,0.25);
        }

        h2{
            text-align:center;
            color:#2c3e50;
            margin-bottom:30px;
            font-size:30px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#333;
        }

        input[type="text"],
        select{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
            transition:0.3s;
        }

        input[type="text"]:focus,
        select:focus{
            outline:none;
            border-color:#007bff;
            box-shadow:0 0 8px rgba(0,123,255,0.3);
        }

        .submit-btn{
            width:100%;
            padding:14px;
            background:linear-gradient(45deg,#007bff,#00c6ff);
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .submit-btn:hover{
            background:linear-gradient(45deg,#0056b3,#0099cc);
            transform:scale(1.03);
        }

    </style>

</head>

<body>

<div class="container">

    <form action="/saveEmployee" th:object="${employee}" method="post">

        <h2>👨‍💼 Update Employee</h2>

        <div class="form-group">
            <label>Employee Name</label>
            <input type="text" th:field="*{name}">
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" th:field="*{address}">
        </div>

        <div class="form-group">
            <label>Salary</label>
            <input type="text" th:field="*{salary}">
        </div>

        <div class="form-group">
            <label>Department</label>
            <select th:field="*{department}">
                <option th:each="department : ${departments}"
                        th:value="${department}"
                        th:text="${department.name}">
                </option>
            </select>
        </div>

        <input type="submit" value="Update Employee" class="submit-btn">

    </form>

</div>

</body>
</html>
